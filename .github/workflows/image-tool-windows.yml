name: Image Tool - Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "image-tool/**"
      - ".github/workflows/image-tool-windows.yml"

env:
  PIP_DEFAULT_TIMEOUT: "300"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: image-tool

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            image-tool/requirements-windows.txt
            image-tool/build/windows/requirements-build.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build exe and installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\build\windows\build.ps1

      - name: Verify build outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "dist\ImageTool\ImageTool.exe"
          $setup = "installer\output\ImageToolSetup.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          if (-not (Test-Path $setup)) { throw "Missing $setup" }
          Write-Host "OK: $exe"
          Write-Host "OK: $setup"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ImageTool-Windows
          path: |
            image-tool/dist/ImageTool/
            image-tool/installer/output/ImageToolSetup.exe
          if-no-files-found: error
