name: Screen Capture Tool - Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "screen-capture-tool/**"
      - ".github/workflows/screen-capture-tool-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: screen-capture-tool

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            screen-capture-tool/requirements-windows.txt
            screen-capture-tool/build/windows/requirements-build.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build exe, portable zip and installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\build\windows\build.ps1

      - name: Verify build outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "dist\ScreenCapture\ScreenCapture.exe"
          $portable = "installer\output\ScreenCapture-Portable.zip"
          $setup = "installer\output\ScreenCaptureSetup.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          if (-not (Test-Path $portable)) { throw "Missing $portable" }
          if (-not (Test-Path $setup)) { throw "Missing $setup" }
          Write-Host "OK: $exe"
          Write-Host "OK: $portable"
          Write-Host "OK: $setup"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScreenCapture-Windows
          path: |
            screen-capture-tool/installer/output/ScreenCapture-Portable.zip
            screen-capture-tool/installer/output/ScreenCaptureSetup.exe
          if-no-files-found: error

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/screen-capture-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            screen-capture-tool/installer/output/ScreenCapture-Portable.zip
            screen-capture-tool/installer/output/ScreenCaptureSetup.exe
          generate_release_notes: true
