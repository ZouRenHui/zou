name: PDF to Word - Linux/Kylin Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "pdf-to-word/**"
      - ".github/workflows/pdf-to-word-linux.yml"

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: pdf-to-word

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-tk python3-dev

      - name: Build portable package
        run: |
          chmod +x build/linux/build.sh
          ./build/linux/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PdfToWord-Kylin
          path: pdf-to-word/installer/output/PdfToWord-Kylin-*.tar.gz
          if-no-files-found: error
