name: PDF to Word - Linux/Kylin Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "pdf-to-word/**"
      - ".github/workflows/pdf-to-word-linux.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-20.04
            arch_name: x86_64
          - runs-on: ubuntu-24.04-arm
            arch_name: aarch64

    runs-on: ${{ matrix.runs-on }}
    defaults:
      run:
        working-directory: pdf-to-word

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv python3-tk python3-dev file

      - name: Build portable package (${{ matrix.arch_name }})
        run: |
          chmod +x build/linux/*.sh
          ./build/linux/build.sh
          uname -m
          file installer/output/PdfToWord-Kylin-*.run || true

      - name: Upload artifacts (${{ matrix.arch_name }})
        uses: actions/upload-artifact@v4
        with:
          name: PdfToWord-Kylin-${{ matrix.arch_name }}
          path: |
            pdf-to-word/installer/output/PdfToWord-Kylin-*
            pdf-to-word/installer/output/setup-kylin.sh
            pdf-to-word/installer/output/setup-kylin.desktop
            pdf-to-word/installer/output/uninstall-kylin.sh
            pdf-to-word/installer/output/一键安装-PDF工具箱.desktop
            pdf-to-word/installer/output/一键修复-PDF工具箱.desktop
            pdf-to-word/installer/output/打开-PDF工具箱.desktop
            pdf-to-word/installer/output/使用说明.txt
            pdf-to-word/installer/output/PdfToWord-修复包-*
            pdf-to-word/installer/output/repair-menu.sh
            pdf-to-word/installer/output/KYLIN-DOWNLOAD-README.txt
          if-no-files-found: error

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: PdfToWord-Kylin-*
          merge-multiple: true
          path: release-files

      - name: List release files
        run: ls -la release-files/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kylin-${{ github.run_number }}
          name: PDF Toolbox Kylin Build ${{ github.run_number }}
          body: |
            Kylin / Linux portable builds for **x86_64** and **aarch64 (ARM)**.

            **Choose the file matching your CPU (`uname -m`):**

            | Your system | Download |
            |-------------|----------|
            | `x86_64` (Intel/AMD) | `PdfToWord-Kylin-x86_64.run` |
            | `aarch64` (飞腾/鲲鹏等 ARM) | `PdfToWord-Kylin-aarch64.run` |

            **One-click install (Kylin aarch64):**

            1. Download `PdfToWord-Kylin-aarch64.run`
            2. chmod +x PdfToWord-Kylin-aarch64.run
            3. Double-click to install (creates desktop shortcut automatically)

            Or double-click `一键安装-PDF工具箱.desktop` in the same folder.
          files: release-files/*
          draft: false
          prerelease: true
